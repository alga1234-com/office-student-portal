<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OASIS - Document & Student Portal</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- Login Section -->
   <input type="text"
       maxlength="13"
       pattern="\d{1,13}"
       title="Enter up to 13 digits, numbers only"
       inputmode="numeric"
       placeholder="Enter phone number" />

  <div id="loginSection">
    <form id="loginForm">
      <h2>Login to OASIS</h2>
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
      <div id="loginError">Invalid credentials</div>
    </form>
  </div>

  <!-- Main Dashboard (shown after login) -->
  <div id="dashboard" style="display: none;">
    <header>
      <h1>OASIS Cockpit</h1>
      <button id="logoutBtn">Logout</button>
    </header>

    <!-- Role Display -->
    <div id="userRoleDisplay"></div>

    <!-- Navigation Tabs -->
    <nav>
      <button class="tab" data-tab="documentsTab">Documents</button>
      <button class="tab" data-tab="resultsTab">Student Results</button>
      <button class="tab" data-tab="complaintsTab">Complaints</button>
      <button class="tab admin-only" data-tab="auditTab">Audit Logs</button>
      <button class="tab admin-only" data-tab="adminToolsTab">Admin Tools</button>
    </nav>

    <!-- Tab: Document Management -->
    <section id="documentsTab" class="tab-content">
      <h2>Document Upload & Viewer</h2>

      <form id="uploadForm">
        <label for="docTitle">Title:</label>
        <input type="text" id="docTitle" required />

        <label for="docFile">File:</label>
        <input type="file" id="docFile" required />

        <button type="submit">Upload</button>
      </form>

      <div class="filters">
        <input type="text" id="docSearch" placeholder="Search by title" />
        <button id="searchDocsBtn">Search</button>
      </div>

      <table id="documentTable">
        <thead>
          <tr>
            <th>Title</th>
            <th>Uploaded</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <!-- Document Viewer -->
      <div id="documentViewer">
        <div id="pdfViewerContainer">
          <canvas id="pdfCanvas"></canvas>
          <div id="pdfControls">
            <button id="prevPage">Previous</button>
            <button id="nextPage">Next</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab: Student Results -->
    <section id="resultsTab" class="tab-content" style="display: none;">
      <h2>Student Results</h2>
      <div class="filters">
        <input type="text" id="resultSearch" placeholder="Enter Registration No." />
        <button id="fetchResultsBtn">Get Results</button>
      </div>
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Course</th>
            <th>Grade</th>
            <th>Semester</th>
            <th>Year</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Tab: Complaints -->
    <section id="complaintsTab" class="tab-content" style="display: none;">
      <h2>Student Complaints</h2>
      <form id="complaintForm">
        <textarea id="complaintText" placeholder="Describe your issue..." required></textarea>
        <button type="submit">Submit Ticket</button>
      </form>
      <table id="complaintsTable">
        <thead>
          <tr>
            <th>Ticket</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Tab: Audit Logs -->
    <section id="auditTab" class="tab-content admin-only" style="display: none;">
      <h2>Audit Trail</h2>
      <table id="auditLogTable">
        <thead>
          <tr>
            <th>User</th>
            <th>Action</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Tab: Admin Tools -->
    <section id="adminToolsTab" class="tab-content admin-only" style="display: none;">
      <h2>Admin Tools</h2>
      <button id="bulkUploadBtn">Upload Student List (CSV)</button>
      <input type="file" id="bulkStudentFile" style="display: none;" />
      <div id="adminActions"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
